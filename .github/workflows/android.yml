name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Install Dependencies
      run: |
        npm install

    - name: Create Structure and Config
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        # Define o carregamento local estável com liberação para requisições externas
        echo '{"appId": "com.intercom.moto", "appName": "IntercomMoto", "webDir": "www", "server": { "cleartext": true, "allowNavigation": ["comunicador-moto.onrender.com"] }}' > capacitor.config.json

    - name: Build Android Project
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Inject Permissions and Network Security
      run: |
        # Injeta as permissões nativas de áudio e internet que o Android exige para WebSockets estáveis
        sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
        sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/debug/app-debug.apk
