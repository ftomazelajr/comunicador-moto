name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Create Structure and Config
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        # ISSO ATIVA A ATUALIZAÇÃO AUTOMÁTICA VIA NUVEM:
        echo '{"appId": "com.intercom.moto", "appName": "IntercomMoto", "webDir": "www", "server": { "url": "https://comunicador-moto.onrender.com", "cleartext": true }}' > capacitor.config.json

    - name: Build Android Project
      run: |
        npx cap add android
        npx cap sync android

    - name: Inject Permissions
      run: |
        sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/debug/app-debug.apk

