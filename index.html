<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intercom Moto v2</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 15px; margin: 0; }
        h1 { color: #00adb5; font-size: 26px; margin-bottom: 5px; }
        
        .btn { display: inline-block; width: 90%; max-width: 320px; padding: 18px; margin: 10px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-moto { background: #393e46; color: #00adb5; border: 3px solid #00adb5; }
        .btn-pass { background: #393e46; color: #ff2e63; border: 3px solid #ff2e63; }
        
        .painel { display: none; margin-top: 15px; padding: 15px; background: #222831; border-radius: 12px; }
        
        /* Estilo Piloto */
        .btn-talk { background: #00adb5; color: white; width: 180px; height: 180px; border-radius: 50%; font-size: 26px; border: none; box-shadow: 0 0 20px rgba(0,173,181,0.5); cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-talk.gravando { background: #ff2e63; box-shadow: 0 0 30px rgba(255,46,99,0.8); }
        
        /* Estilo Passageiro - Botões Rápidos e Grandes */
        .grid-atalhos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-fast { background: #393e46; color: #eeeeee; border: 2px solid #555; padding: 20px 10px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; height: 90px; display: flex; align-items: center; justify-content: center; }
        .btn-fast:active { background: #ff2e63; border-color: #ff2e63; }
        .danger { border-color: #ff2e63; color: #ff2e63; }
        
        #txtMensagem { width: 85%; padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-top: 20px; background: #393e46; color: white; }
        #btnEnviar { background: #00adb5; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; font-weight: bold; width: 85%; margin-top: 10px; }
        
        #status { margin-top: 15px; color: #aa5; font-style: italic; font-weight: bold; font-size: 16px; }
        #chat { margin-top: 10px; font-size: 28px; font-weight: bold; color: #00adb5; padding: 15px; background: #393e46; border-radius: 12px; min-height: 60px; border-left: 6px solid #00adb5; text-align: left; }
    </style>
</head>
<body>

    <h1>🎙️ Intercom Moto</h1>
    <div id="status">Selecione a sua função:</div>

    <div id="selecao">
        <button class="btn btn-moto" onclick="conectar('motorista')">🏍️ Sou o Motorista</button>
        <button class="btn btn-pass" onclick="conectar('passageiro')">🎒 Sou o Passageiro</button>
    </div>

    <div id="painel-motorista" class="painel">
        <p style="font-size: 18px;">Segure o botão para falar:</p>
        <button id="talkBtn" class="btn btn-talk">FALAR</button>
        <p style="color: #888; margin-top: 20px; font-size: 16px;">O que o passageiro mandar vai tocar direto no seu fone.</p>
    </div>

    <div id="painel-passageiro" class="painel">
        <div id="chat">Aguardando piloto...</div>
        
        <div class="grid-atalhos">
            <button class="btn-fast danger" onclick="enviarFrasePronta('Cuidado! Buraco ou perigo à frente!')">⚠️ CUIDADO!</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Devagar, vai mais devagar.')">🛑 VAI DEVAGAR</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Para a moto assim que puder.')">🏍️ PARA A MOTO</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Preciso ir ao banheiro.')">🚾 BANHEIRO</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Quero parar em um posto para esticar as pernas.')">⛽ POSTO / PARADA</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Tudo certo por aqui, pode marchar!')">👍 TUDO CERTO</button>
        </div>

        <input type="text" id="txtMensagem" placeholder="Ou digite algo personalizado...">
        <button id="btnEnviar" onclick="enviarTexto()">📩 Enviar Texto Livre</button>
    </div>

    <script>
        let ws;
        let papelUsuario = "";
        const SERVER_URL = "wss://comunicador-moto.onrender.com"; 

        const statusDiv = document.getElementById("status");
        const selecaoDiv = document.getElementById("selecao");
        const talkBtn = document.getElementById("talkBtn");
        const chatDiv = document.getElementById("chat");

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const textoFalado = event.results[0][0].transcript;
                ws.send(JSON.stringify({ origem: papelUsuario, texto: textoFalado }));
            };
        }

        function conectar(papel) {
            papelUsuario = papel;
            statusDiv.innerText = `Conectando...`;
            
            ws = new WebSocket(SERVER_URL);

            ws.onopen = () => {
                statusDiv.innerText = `Conectado como ${papel.toUpperCase()}`;
                statusDiv.style.color = "#00ff00";
                selecaoDiv.style.display = "none";
                
                if (papel === 'motorista') {
                    document.getElementById("painel-motorista").style.display = "block";
                    configurarBotaoMotorista();
                } else {
                    document.getElementById("painel-passageiro").style.display = "block";
                }
                
                ws.send(JSON.stringify({ origem: papel, tipo: "registro" }));
            };

            ws.onmessage = (event) => {
                const dados = JSON.parse(event.data);
                
                if (papelUsuario === "passageiro" && dados.texto) {
                    chatDiv.innerText = dados.texto;
                    // Faz o celular do passageiro vibrar ao receber mensagem do piloto
                    if (navigator.vibrate) navigator.vibrate(200);
                } 
                
                if (papelUsuario === "motorista" && dados.texto) {
                    falarNoFone(dados.texto);
                }
            };

            ws.onclose = () => {
                statusDiv.innerText = "Sem sinal. Reconectando...";
                statusDiv.style.color = "#ff0000";
                setTimeout(() => conectar(papel), 2000);
            };
        }

        function configurarBotaoMotorista() {
            if (!recognition) return;
            const ligarGravacao = (e) => {
                e.preventDefault();
                talkBtn.classList.add("gravando");
                talkBtn.innerText = "FALANDO...";
                recognition.start();
            };
            talkBtn.addEventListener("mousedown", ligarGravacao);
            talkBtn.addEventListener("touchstart", ligarGravacao);
        }

        // Função para os botões rápidos
        function enviarFrasePronta(frase) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ origem: papelUsuario, texto: frase }));
                statusDiv.innerText = "Alerta enviado para o piloto!";
                setTimeout(() => { statusDiv.innerText = `Conectado como ${papelUsuario.toUpperCase()}`; }, 2000);
            }
        }

        function enviarTexto() {
            const campo = document.getElementById("txtMensagem");
            const texto = campo.value.trim();
            if (texto && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ origem: papelUsuario, texto: texto }));
                campo.value = "";
            }
        }

        function falarNoFone(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Cancela falas antigas para priorizar o alerta novo
                const foneExpressao = new SpeechSynthesisUtterance(texto);
                foneExpressao.lang = 'pt-BR';
                foneExpressao.rate = 1.2; // Voz levemente rápida para cortar o som do vento
                window.speechSynthesis.speak(foneExpressao);
            }
        }
    </script>
</body>
</html>
