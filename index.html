<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicador de Moto (Voz/Texto)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        h1 { color: #00adb5; }
        .btn { display: inline-block; width: 80%; max-width: 300px; padding: 15px; margin: 10px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-moto { background: #393e46; color: #00adb5; border: 2px solid #00adb5; }
        .btn-pass { background: #393e46; color: #ff2e63; border: 2px solid #ff2e63; }
        
        /* Painéis específicos */
        .painel { display: none; margin-top: 30px; padding: 20px; background: #222831; border-radius: 10px; }
        
        /* Estilo Motorista */
        .btn-talk { background: #00adb5; color: white; width: 150px; height: 150px; border-radius: 50%; font-size: 22px; border: none; box-shadow: 0 0 15px rgba(0,173,181,0.5); cursor: pointer; }
        .btn-talk.gravando { background: #ff2e63; box-shadow: 0 0 25px rgba(255,46,99,0.8); }
        
        /* Estilo Passageiro */
        #txtMensagem { width: 80%; max-width: 400px; padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-bottom: 10px; }
        #btnEnviar { background: #ff2e63; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; font-weight: bold; }
        
        #status { margin-top: 20px; color: #888; font-style: italic; }
        #chat { margin-top: 20px; font-size: 24px; font-weight: bold; color: #eeeeee; padding: 10px; background: #393e46; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body>

    <h1>🎙️ Intercom Moto (Voz ↔ Texto)</h1>
    <div id="status">Selecione a sua função:</div>

    <div id="selecao">
        <button class="btn btn-moto" onclick="conectar('motorista')">🏍️ Sou o Motorista</button>
        <button class="btn btn-pass" onclick="conectar('passageiro')">🎒 Sou o Passageiro</button>
    </div>

    <div id="painel-motorista" class="painel">
        <p>Segure para falar com o passageiro:</p>
        <button id="talkBtn" class="btn btn-talk">FALAR</button>
        <p style="color: #888; margin-top: 15px;">O que o passageiro digitar vai tocar no seu fone.</p>
    </div>

    <div id="painel-passageiro" class="painel">
        <div id="chat">Aguardando fala do motorista...</div>
        <br><br>
        <input type="text" id="txtMensagem" placeholder="Digite para o motorista ouvir...">
        <br>
        <button id="btnEnviar" onclick="enviarTexto()">📩 Enviar para o Fone</button>
    </div>

    <script>
        let ws;
        let papelUsuario = "";
        const SERVER_URL = "wss://comunicador-moto.onrender.com"; 

        const statusDiv = document.getElementById("status");
        const selecaoDiv = document.getElementById("selecao");
        const talkBtn = document.getElementById("talkBtn");
        const chatDiv = document.getElementById("chat");

        // Configuração do Reconhecimento de Voz (Nativo do Celular)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const textoFalado = event.results[0][0].transcript;
                statusDiv.innerText = "Enviando texto...";
                // Envia o texto reconhecido para o servidor
                ws.send(JSON.stringify({ origem: papelUsuario, texto: textoFalado }));
            };

            recognition.onend = () => {
                talkBtn.classList.remove("gravando");
                talkBtn.innerText = "FALAR";
            };
        }

        function conectar(papel) {
            papelUsuario = papel;
            statusDiv.innerText = `Conectando ao servidor...`;
            
            ws = new WebSocket(SERVER_URL);

            ws.onopen = () => {
                statusDiv.innerText = `Conectado com sucesso!`;
                statusDiv.style.color = "#00ff00";
                selecaoDiv.style.display = "none";
                
                // Abre o painel certo baseado na escolha
                if (papel === 'motorista') {
                    document.getElementById("painel-motorista").style.display = "block";
                    configurarBotaoMotorista();
                } else {
                    document.getElementById("painel-passageiro").style.display = "block";
                }
                
                // Registro inicial no servidor
                ws.send(JSON.stringify({ origem: papel, tipo: "registro" }));
            };

            ws.onmessage = (event) => {
                const dados = JSON.parse(event.data);
                
                if (papelUsuario === "passageiro" && dados.texto) {
                    // O Passageiro LÊ na tela o que o motorista falou
                    chatDiv.innerText = "🏍️ Motorista: " + dados.texto;
                } 
                
                if (papelUsuario === "motorista" && dados.texto) {
                    // O Motorista OUVE no fone o que o passageiro digitou
                    falarNoFone(dados.texto);
                }
            };

            ws.onclose = () => {
                statusDiv.innerText = "Conexão perdida. Reconectando...";
                statusDiv.style.color = "#ff0000";
                setTimeout(() => conectar(papel), 3000);
            };
        }

        // AÇÃO DO MOTORISTA (Captura a voz e transforma em texto)
        function configurarBotaoMotorista() {
            if (!recognition) {
                alert("Seu navegador não suporta reconhecimento de voz. Use o Safari no iPhone ou Chrome no Android.");
                return;
            }

            const ligarGravacao = (e) => {
                e.preventDefault();
                talkBtn.classList.add("gravando");
                talkBtn.innerText = "OUVINDO...";
                recognition.start();
            };

            talkBtn.addEventListener("mousedown", ligarGravacao);
            talkBtn.addEventListener("touchstart", ligarGravacao);
        }

        // AÇÃO DO PASSAGEIRO (Envia o texto digitado)
        function enviarTexto() {
            const campo = document.getElementById("txtMensagem");
            const texto = campo.value.trim();
            if (texto && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ origem: papelUsuario, texto: texto }));
                campo.value = "";
                statusDiv.innerText = "Texto enviado para o fone do piloto!";
            }
        }

        // SÍNTESE DE VOZ (Faz o fone do motorista falar o texto)
        function falarNoFone(texto) {
            if ('speechSynthesis' in window) {
                const foneExpressao = new SpeechSynthesisUtterance(texto);
                foneExpressao.lang = 'pt-BR';
                foneExpressao.rate = 1.1; // Velocidade da voz um pouquinho mais rápida para a moto
                window.speechSynthesis.speak(foneExpressao);
            }
        }
    </script>
</body>
</html>
