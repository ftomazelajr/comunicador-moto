<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00adb5">
    <link rel="manifest" href="manifest.json">
    <title>Intercom Moto</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 15px; margin: 0; }
        h1 { color: #00adb5; font-size: 26px; margin-bottom: 5px; }
        .btn { display: inline-block; width: 90%; max-width: 320px; padding: 18px; margin: 10px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-moto { background: #393e46; color: #00adb5; border: 3px solid #00adb5; }
        .btn-pass { background: #393e46; color: #ff2e63; border: 2px solid #ff2e63; }
        .painel { display: none; margin-top: 15px; padding: 15px; background: #222831; border-radius: 12px; }
        .btn-talk { background: #393e46; color: #888; width: 180px; height: 180px; border-radius: 50%; font-size: 22px; border: 4px dashed #555; margin-top: 20px; font-weight: bold; cursor: pointer; }
        .btn-talk.sentinela { border-color: #00adb5; color: #00adb5; border-style: solid; }
        .btn-talk.gravando { background: #ff2e63; color: white; border: 4px solid #ff2e63; box-shadow: 0 0 30px rgba(255,46,99,0.8); animation: pulse 1.5s infinite; }
        .grid-atalhos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-fast { background: #393e46; color: #eeeeee; border: 2px solid #555; padding: 20px 10px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; height: 90px; display: flex; align-items: center; justify-content: center; }
        .btn-fast:active { background: #ff2e63; border-color: #ff2e63; }
        .danger { border-color: #ff2e63; color: #ff2e63; }
        #txtMensagem { width: 85%; padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-top: 20px; background: #393e46; color: white; }
        #btnEnviar { background: #00adb5; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; font-weight: bold; width: 85%; margin-top: 10px; cursor: pointer; }
        #status { margin-top: 15px; color: #aa5; font-style: italic; font-weight: bold; font-size: 18px; }
        #chat { margin-top: 10px; font-size: 28px; font-weight: bold; color: #00adb5; padding: 15px; background: #393e46; border-radius: 12px; min-height: 60px; border-left: 6px solid #00adb5; text-align: left; }
        .flash-alerta { background: #ff2e63 !important; color: white !important; }
        #debugLog { margin-top: 12px; padding: 10px; background: #1a1a2e; border-radius: 8px; font-size: 13px; color: #888; text-align: left; min-height: 36px; border: 1px solid #333; word-break: break-word; }
        #debugLog span { color: #00adb5; }
        #btnAtualizar { position: fixed; bottom: 18px; right: 18px; background: #222831; color: #00adb5; border: 2px solid #00adb5; border-radius: 50px; padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer; z-index: 999; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,46,99,0.7); }
            70%  { box-shadow: 0 0 0 20px rgba(255,46,99,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,46,99,0); }
        }
    </style>
</head>
<body>

<button id="btnAtualizar" onclick="verificarAtualizacao()">🔄 Atualizar</button>
<h1>🎙️ Intercom Moto</h1>
<div id="status">Escolha a sua função:</div>

<div id="selecao">
    <button class="btn btn-moto" onclick="conectar('motorista')">🏍️ Sou o Motorista</button>
    <button class="btn btn-pass" onclick="conectar('passageiro')">🎒 Sou o Passageiro</button>
</div>

<div id="painel-motorista" class="painel">
    <p style="font-size: 18px;">Mãos no guidão! Diga bem alto:</p>
    <h2 style="color: #ff2e63; font-size: 32px; margin: 10px 0;">"AVISO"</h2>
    <button id="talkBtn" class="btn btn-talk" onclick="iniciarSentinela()">LIGAR<br>SENTINELA</button>
    <p style="color: #888; margin-top: 20px; font-size: 15px;">Ele só dará um BIPE quando escutar "AVISO".</p>
    <div id="debugLog">🎤 Aguardando ativação...</div>
</div>

<div id="painel-passageiro" class="painel">
    <div id="chat">Aguardando o piloto...</div>
    <div class="grid-atalhos">
        <button class="btn-fast danger" onclick="enviarFrasePronta('Cuidado! Perigo à frente!')">⚠️ CUIDADO!</button>
        <button class="btn-fast" onclick="enviarFrasePronta('Devagar, abranda um pouco.')">🛑 VAI DEVAGAR</button>
        <button class="btn-fast" onclick="enviarFrasePronta('Para a moto assim que puderes.')">🏍️ PARA A MOTO</button>
        <button class="btn-fast" onclick="enviarFrasePronta('Preciso parar no banheiro.')">🚾 BANHO</button>
        <button class="btn-fast" onclick="enviarFrasePronta('Quero parar num posto.')">⛽ POSTO</button>
        <button class="btn-fast" onclick="enviarFrasePronta('Tudo certo, pode acelerar!')">👍 TUDO CERTO</button>
    </div>
    <input type="text" id="txtMensagem" placeholder="Ou digite outra mensagem...">
    <button id="btnEnviar" onclick="enviarTexto()">📩 Enviar Texto Livre</button>
</div>

<script>
    const SERVER_URL = "wss://comunicador-moto.onrender.com";
    const GITHUB_URL = "https://ftomazelajr.github.io/comunicador-moto/";

    let ws, papelUsuario, rec;
    let sentinelaAtivo = false, janelaFalaAtiva = false;
    let tempoJanela = null, audioCtx = null;

    const statusDiv = document.getElementById("status");
    const talkBtn   = document.getElementById("talkBtn");
    const chatDiv   = document.getElementById("chat");
    const debugLog  = document.getElementById("debugLog");

    function verificarAtualizacao() {
        const btn = document.getElementById("btnAtualizar");
        btn.textContent = "⏳"; btn.disabled = true;
        fetch(GITHUB_URL + "?t=" + Date.now(), { cache: "no-store" })
            .then(r => { if (!r.ok) throw new Error(); return r.text(); })
            .then(html => { document.open(); document.write(html); document.close(); })
            .catch(() => {
                btn.textContent = "❌ Falhou"; btn.disabled = false;
                setTimeout(() => { btn.textContent = "🔄 Atualizar"; }, 3000);
            });
    }

    function bip(freq, dur) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = "sine";
            o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            o.start(); o.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }

    function norm(t) {
        return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
    }

    function log(txt, destaque) {
        debugLog.innerHTML = destaque ? `🎤 <span>${txt}</span>` : `🎤 ${txt}`;
    }

    function abrirJanela() {
        if (janelaFalaAtiva) return;
        janelaFalaAtiva = true;
        bip(880, 0.15);
        talkBtn.classList.add("gravando");
        talkBtn.innerHTML = "🎤 FALANDO...";
        statusDiv.innerText = "Transmissão ativa! Fale agora...";
        if (navigator.vibrate) navigator.vibrate([100,50,100]);
        log("Janela aberta — fale a mensagem", true);
        tempoJanela = setTimeout(fecharJanela, 6000);
    }

    function fecharJanela() {
        janelaFalaAtiva = false;
        bip(440, 0.2);
        talkBtn.classList.remove("gravando");
        talkBtn.classList.add("sentinela");
        talkBtn.innerHTML = "MODO<br>SENTINELA";
        statusDiv.innerText = "Diga 'AVISO' para falar.";
        log("Escutando... diga AVISO");
    }

    function processar(frase) {
        if (!frase) return;
        const f = norm(frase);
        log(frase);
        if (!janelaFalaAtiva && f.includes("aviso")) {
            abrirJanela();
        } else if (janelaFalaAtiva && !f.includes("aviso")) {
            if (ws && ws.readyState === WebSocket.OPEN)
                ws.send(JSON.stringify({ origem: papelUsuario, texto: frase }));
            clearTimeout(tempoJanela);
            fecharJanela();
        }
    }

    function iniciarSentinela() {
        if (sentinelaAtivo) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { alert("Reconhecimento de voz não disponível."); return; }

        rec = new SR();
        rec.lang = 'pt-BR';
        rec.continuous = false;
        rec.interimResults = true;

        rec.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; i++)
                processar(e.results[i][0].transcript);
        };
        rec.onerror = (e) => {
            log("Erro: " + e.error);
            if (e.error !== 'aborted' && sentinelaAtivo)
                setTimeout(() => { try { rec.start(); } catch(x) {} }, 300);
        };
        rec.onend = () => {
            if (sentinelaAtivo)
                setTimeout(() => { try { rec.start(); } catch(x) {} }, 300);
        };

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(() => {
                rec.start();
                sentinelaAtivo = true;
                talkBtn.classList.add("sentinela");
                talkBtn.innerHTML = "MODO<br>SENTINELA";
                statusDiv.innerText = "Sentinela ativado! Diga 'AVISO'.";
                log("Escutando... diga AVISO");
            })
            .catch(() => alert("Permita o microfone."));
    }

    function conectar(papel) {
        papelUsuario = papel;
        statusDiv.innerText = "A ligar ao servidor...";
        ws = new WebSocket(SERVER_URL);
        ws.onopen = () => {
            statusDiv.style.color = "#00ff00";
            document.getElementById("selecao").style.display = "none";
            if (papel === 'motorista') {
                document.getElementById("painel-motorista").style.display = "block";
                statusDiv.innerText = "Clique para ligar o microfone.";
            } else {
                document.getElementById("painel-passageiro").style.display = "block";
                statusDiv.innerText = "Ligado como PASSAGEIRO";
            }
            ws.send(JSON.stringify({ origem: papel, tipo: "registro" }));
        };
        ws.onmessage = (event) => {
            const dados = JSON.parse(event.data);
            if (papelUsuario === "passageiro" && dados.texto) {
                chatDiv.innerText = dados.texto;
                chatDiv.classList.add("flash-alerta");
                setTimeout(() => chatDiv.classList.remove("flash-alerta"), 600);
                if (navigator.vibrate) navigator.vibrate(300);
            }
            if (papelUsuario === "motorista" && dados.texto) falarNoFone(dados.texto);
        };
        ws.onclose = () => {
            statusDiv.innerText = "Sinal perdido. Reconectando...";
            statusDiv.style.color = "#ff0000";
            setTimeout(() => conectar(papel), 2000);
        };
    }

    function enviarFrasePronta(frase) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ origem: papelUsuario, texto: frase }));
            statusDiv.innerText = "Alerta enviado!";
            setTimeout(() => { statusDiv.innerText = "Ligado como PASSAGEIRO"; }, 1500);
        }
    }

    function enviarTexto() {
        const campo = document.getElementById("txtMensagem");
        const texto = campo.value.trim();
        if (texto && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ origem: papelUsuario, texto: texto }));
            campo.value = "";
        }
    }

    function falarNoFone(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(texto);
            u.lang = 'pt-BR'; u.rate = 1.25;
            window.speechSynthesis.speak(u);
        }
    }
</script>
</body>
</html>
