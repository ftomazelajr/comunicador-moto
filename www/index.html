<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intercom Moto</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 50px;
        }
        h1 {
            color: #00e676;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .status-box {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #333;
        }
        .status-text {
            font-size: 18px;
            font-weight: bold;
            color: #ffb300;
        }
        .active {
            color: #00e676 !important;
        }
        .pulse {
            width: 20px;
            height: 20px;
            background: #ffb300;
            border-radius: 50%;
            margin: 15px auto;
            animation: blink 1.5s infinite;
        }
        .pulse.listening {
            background: #00e676;
        }
        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        .log-box {
            background: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ Intercomunicador Moto</h1>
        <p>Mantenha o app aberto e fale "AVISO" para alertar o passageiro.</p>

        <div class="status-box">
            <div id="statusPulse" class="pulse"></div>
            <div id="statusLabel" class="status-text">Iniciando sistema...</div>
        </div>

        <h3>Histórico de Escuta:</h3>
        <div id="logBox" class="log-box">Aguardando áudio...<br></div>
    </div>

    <script>
        const statusLabel = document.getElementById('statusLabel');
        const statusPulse = document.getElementById('statusPulse');
        const logBox = document.getElementById('logBox');

        function addLog(text) {
            logBox.innerHTML += `> ${text}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Configuração do Reconhecimento de Voz Nativo do Navegador (Web View)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusLabel.innerText = "Erro: Aparelho não suporta reconhecimento de voz.";
            statusLabel.style.color = "#ff1744";
            addLog("Erro crítico: WebSpeech não suportado.");
        } else {
            const recognition = new SpeechRecognition();
            
            // Força o modo contínuo para não desligar sozinho
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'pt-BR';

            // Quando a escuta começa de verdade
            recognition.onstart = function() {
                statusLabel.innerText = "Escutando estrada (Diga: AVISO)";
                statusLabel.className = "status-text active";
                statusPulse.className = "pulse listening";
                addLog("Microfone ativado. Escutando...");
            };

            // Se der qualquer erro (como timeout ou falta de fala)
            recognition.onerror = function(event) {
                console.error("Erro no reconhecimento:", event.error);
                addLog(`Aviso de sistema: ${event.error}`);
            };

            // O SEGREDO DO LOOP: Se o Android derrubar ou pausar, força a reinicialização imediata
            recognition.onend = function() {
                statusLabel.innerText = "Reconectando escuta...";
                statusLabel.className = "status-text";
                statusPulse.className = "pulse";
                addLog("Escuta encerrada pelo sistema. Reiniciando...");
                
                // Tenta reiniciar após meio segundo para evitar travamento
                setTimeout(() => {
                    try {
                        recognition.start();
                    } catch(e) {
                        addLog("Erro ao forçar reinício automático.");
                    }
                }, 500);
            };

            // Processa o que foi falado
            recognition.onresult = function(event) {
                const currentResultIndex = event.resultIndex;
                const textoFalado = event.results[currentResultIndex][0].transcript.trim().toLowerCase();
                
                addLog(`Escutado: "${textoFalado}"`);

                // Verifica se a palavra "aviso" está no meio do que foi dito
                if (textoFalado.includes('aviso')) {
                    addLog("🚨 COMANDO DETECTADO: Disparando Alerta!");
                    alertarPassageiro();
                }
            };

            // Função para disparar a ação do alerta (Áudio ou Vibração)
            function alertarPassageiro() {
                // Emite um bipe nativo usando a API de áudio do celular
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Tom mais agudo/alerta
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime); // Volume máximo

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                // Toca um bipe duplo forte
                oscillator.start();
                setTimeout(() => { oscillator.stop(); }, 400);

                // Faz o celular vibrar fisicamente por 1 segundo (se permitido)
                if (navigator.vibrate) {
                    navigator.vibrate([400, 200, 400]);
                }
            }

            // Inicializa a primeira execução ao abrir o app
            try {
                recognition.start();
            } catch(e) {
                addLog("Erro na inicialização manual.");
            }
        }
    </script>
</body>
</html>
