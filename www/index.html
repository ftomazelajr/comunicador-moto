<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intercom Moto Mãos-Livres v5</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 15px; margin: 0; }
        h1 { color: #00adb5; font-size: 26px; margin-bottom: 5px; }
        
        .btn { display: inline-block; width: 90%; max-width: 320px; padding: 18px; margin: 10px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-moto { background: #393e46; color: #00adb5; border: 3px solid #00adb5; }
        .btn-pass { background: #393e46; color: #ff2e63; border: 2px solid #ff2e63; }
        
        .painel { display: none; margin-top: 15px; padding: 15px; background: #222831; border-radius: 12px; }
        
        .btn-talk { background: #393e46; color: #888; width: 180px; height: 180px; border-radius: 50%; font-size: 22px; border: 4px dashed #555; margin-top: 20px; font-weight: bold; }
        .btn-talk.gravando { background: #ff2e63; color: white; border: 4px solid #ff2e63; box-shadow: 0 0 30px rgba(255,46,99,0.8); animation: pulse 1.5s infinite; }
        
        .grid-atalhos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-fast { background: #393e46; color: #eeeeee; border: 2px solid #555; padding: 20px 10px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; height: 90px; display: flex; align-items: center; justify-content: center; }
        .btn-fast:active { background: #ff2e63; border-color: #ff2e63; }
        .danger { border-color: #ff2e63; color: #ff2e63; }
        
        #txtMensagem { width: 85%; padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-top: 20px; background: #393e46; color: white; }
        #btnEnviar { background: #00adb5; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 8px; font-weight: bold; width: 85%; margin-top: 10px; }
        
        #status { margin-top: 15px; color: #aa5; font-style: italic; font-weight: bold; font-size: 18px; }
        #chat { margin-top: 10px; font-size: 28px; font-weight: bold; color: #00adb5; padding: 15px; background: #393e46; border-radius: 12px; min-height: 60px; border-left: 6px solid #00adb5; text-align: left; transition: background 0.2s ease; }
        
        .flash-alerta { background: #ff2e63 !important; color: white !important; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,46,99,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255,46,99,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,46,99,0); }
        }
    </style>
</head>
<body>

    <h1>🎙️ Intercom Moto</h1>
    <div id="status">Escolha a sua função:</div>

    <div id="selecao">
        <button class="btn btn-moto" onclick="conectar('motorista')">🏍️ Sou o Motorista</button>
        <button class="btn btn-pass" onclick="conectar('passageiro')">🎒 Sou o Passageiro</button>
    </div>

    <div id="painel-motorista" class="painel">
        <p style="font-size: 18px;">Mãos no guidão! Diga bem alto:</p>
        <h2 style="color: #ff2e63; font-size: 32px; margin: 10px 0;">"AVISO"</h2>
        <button id="talkBtn" class="btn btn-talk" onclick="alternarSentinelaManualmente()">LIGAR<br>SENTINELA</button>
        <p style="color: #888; margin-top: 20px; font-size: 15px;">O sistema fica em silêncio. Ele só dará um BIPE quando escutar a palavra exata "AVISO".</p>
    </div>

    <div id="painel-passageiro" class="painel">
        <div id="chat">Aguardando o piloto...</div>
        
        <div class="grid-atalhos">
            <button class="btn-fast danger" onclick="enviarFrasePronta('Cuidado! Perigo à frente!')">⚠️ CUIDADO!</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Devagar, abranda um pouco.')">🛑 VAI DEVAGAR</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Para a moto assim que puderes.')">🏍️ PARA A MOTO</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Preciso de ir à casa de banho.')">🚾 BANHO</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Quero parar numa área de serviço.')">⛽ PARAGEM / POSTO</button>
            <button class="btn-fast" onclick="enviarFrasePronta('Tudo certo por aqui, podes acelerar!')">👍 TUDO CERTO</button>
        </div>

        <input type="text" id="txtMensagem" placeholder="Ou digite outra mensagem...">
        <button id="btnEnviar" onclick="enviarTexto()">📩 Enviar Texto Livre</button>
    </div>

    <script>
        let ws;
        let papelUsuario = "";
        const SERVER_URL = "wss://comunicador-moto.onrender.com"; 

        const statusDiv = document.getElementById("status");
        const selecaoDiv = document.getElementById("selecao");
        const talkBtn = document.getElementById("talkBtn");
        const chatDiv = document.getElementById("chat");

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let tempoJanelaFala = null;
        let audioCtxGlobal = null;
        let sentinelaAtivo = false;
        let janelaFalaAtiva = false; // controla se estamos no modo "falar após AVISO"
        
        // ── CORREÇÃO 1: normaliza texto removendo acentos para detectar "aviso" com confiança ──
        function normalizarTexto(texto) {
            return texto
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim();
        }

        function tocarBip(tipo) {
            try {
                const audioCtx = audioCtxGlobal || new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                if (tipo === "inicio") {
                    oscillator.type = "sine";
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.15);
                } else if (tipo === "fim") {
                    oscillator.type = "sine";
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); 
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.2);
                }
            } catch (e) {
                console.log("Erro de áudio: ", e);
            }
        }

        function ativarAudioSegundoPlano() {
            try {
                audioCtxGlobal = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtxGlobal.createOscillator();
                const gainNode = audioCtxGlobal.createGain();
                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(1, audioCtxGlobal.currentTime);
                gainNode.gain.setValueAtTime(0.001, audioCtxGlobal.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtxGlobal.destination);
                oscillator.start();
            } catch(e) {
                console.log("Erro áudio fundo:", e);
            }
        }

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';

            // ── CORREÇÃO 2: continuous=true evita o loop de restart quebrado no WebView Android ──
            recognition.continuous = true;

            // ── CORREÇÃO 3: interimResults=false — só resultados finais, muito mais confiável no APK ──
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                // ── CORREÇÃO 4: percorre todos os resultados novos (não só o último índice) ──
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (!event.results[i].isFinal) continue;

                    const frase = normalizarTexto(event.results[i][0].transcript);
                    console.log("Reconhecido:", frase);

                    // Detectou "AVISO" → abre janela de fala
                    if (!janelaFalaAtiva && frase.includes("aviso")) {
                        janelaFalaAtiva = true;

                        if (tempoJanelaFala) clearTimeout(tempoJanelaFala);
                        tocarBip("inicio");

                        talkBtn.classList.add("gravando");
                        talkBtn.innerHTML = "🎤 FALANDO...";
                        statusDiv.innerText = "Transmissão ativa! Fale agora...";
                        if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);

                        // Janela de 6 segundos para capturar a mensagem após "AVISO"
                        tempoJanelaFala = setTimeout(() => {
                            janelaFalaAtiva = false;
                            tocarBip("fim");
                            talkBtn.classList.remove("gravando");
                            talkBtn.innerHTML = "MODO<br>SENTINELA";
                            statusDiv.innerText = "Diga 'AVISO' para falar.";
                        }, 6000);

                    // Janela aberta → captura a mensagem que veio depois do "AVISO"
                    } else if (janelaFalaAtiva && !frase.includes("aviso")) {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ origem: papelUsuario, texto: frase }));
                        }
                    }
                }
            };

            recognition.onerror = (event) => {
                console.log("Erro de reconhecimento:", event.error);

                // ── CORREÇÃO 5: em caso de erro "no-speech" ou "network", reinicia suavemente ──
                if (sentinelaAtivo && (event.error === 'no-speech' || event.error === 'network')) {
                    setTimeout(() => {
                        if (sentinelaAtivo) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 500);
                }
            };

            // ── CORREÇÃO 6: onend só reinicia se o sentinela ainda estiver ativo ──
            // Com continuous=true isso raramente dispara, mas garante robustez
            recognition.onend = () => {
                if (sentinelaAtivo) {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e) {}
                    }, 300);
                }
            };
        }

        async function alternarSentinelaManualmente() {
            if (!recognition) return;
            
            ativarAudioSegundoPlano();
            
            if (!sentinelaAtivo) {
                sentinelaAtivo = true;
                statusDiv.innerText = "Solicitando microfone...";

                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                    recognition.start();
                    talkBtn.innerHTML = "MODO<br>SENTINELA";
                    talkBtn.style.borderColor = "#00adb5";
                    talkBtn.style.color = "#00adb5";
                    statusDiv.innerText = "Sentinela ativado! Diga 'AVISO'.";
                } catch(e) {
                    console.error("Microfone bloqueado:", e);
                    statusDiv.innerText = "Erro: Permita o microfone nas configurações.";
                    alert("Você precisa conceder permissão de microfone para o aplicativo.");
                    sentinelaAtivo = false;
                }
            }
        }

        function conectar(papel) {
            papelUsuario = papel;
            statusDiv.innerText = `A ligar ao servidor...`;
            
            ws = new WebSocket(SERVER_URL);

            ws.onopen = () => {
                statusDiv.innerText = `Ligado com sucesso!`;
                statusDiv.style.color = "#00ff00";
                selecaoDiv.style.display = "none";
                
                if (papel === 'motorista') {
                    document.getElementById("painel-motorista").style.display = "block";
                    statusDiv.innerText = "Clique abaixo para ligar o microfone.";
                } else {
                    document.getElementById("painel-passageiro").style.display = "block";
                }
                
                ws.send(JSON.stringify({ origem: papel, tipo: "registro" }));
            };

            ws.onmessage = (event) => {
                const dados = JSON.parse(event.data);
                if (papelUsuario === "passageiro" && dados.texto) {
                    chatDiv.innerText = dados.texto;
                    chatDiv.classList.add("flash-alerta");
                    setTimeout(() => { chatDiv.classList.remove("flash-alerta"); }, 600);
                    if (navigator.vibrate) navigator.vibrate(300);
                } 
                if (papelUsuario === "motorista" && dados.texto) {
                    falarNoFone(dados.texto);
                }
            };

            ws.onclose = () => {
                statusDiv.innerText = "Sinal perdido. A tentar ligar...";
                statusDiv.style.color = "#ff0000";
                setTimeout(() => conectar(papel), 2000);
            };
        }

        function enviarFrasePronta(frase) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ origem: papelUsuario, texto: frase }));
                statusDiv.innerText = "Alerta enviado!";
                setTimeout(() => { statusDiv.innerText = "Ligado como PASSAGEIRO"; }, 1500);
            }
        }

        function enviarTexto() {
            const campo = document.getElementById("txtMensagem");
            const texto = campo.value.trim();
            if (texto && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ origem: papelUsuario, texto: texto }));
                campo.value = "";
            }
        }

        function falarNoFone(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const foneExpressao = new SpeechSynthesisUtterance(texto);
                foneExpressao.lang = 'pt-BR';
                foneExpressao.rate = 1.25; 
                window.speechSynthesis.speak(foneExpressao);
            }
        }
    </script>
</body>
</html>
